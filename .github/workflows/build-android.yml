name: Compilar APK do app Android

# Dispara em qualquer push, ou manualmente via UI do GitHub
on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Ubuntu, JDK 17, Android SDK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Aceitar licencas do Android SDK
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Compilar APK debug (mais rapido, instalavel direto)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: PCAudioStream-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
